[pytest]
testpaths = tests
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    unit: pure unit tests with no external dependencies
    integration: tests requiring the FastAPI app
    neo4j: tests requiring a live Neo4j instance
    slow: tests that take more than 5 seconds
